name: Backend CI

on:
  push:
    branches:
      - main
      - dev/back-end
      - feat/back-end/**
      - hotfix/back-end/**
  pull_request:
    branches:
      - main
      - dev/back-end

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: Backend

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Java 21 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Gradle 설정
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: 조립
        run: ./gradlew --no-daemon clean assemble

      - name: 계약 테스트
        run: ./gradlew --no-daemon contractTest

      - name: 통합 테스트
        run: ./gradlew --no-daemon integrationTest

      - name: 단위 테스트
        run: ./gradlew --no-daemon unitTest


name: 저장소 라벨 및 이슈 작업 영역 분류

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/**"
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  issues: write

jobs:
  sync-labels-and-route:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 라벨을 맞추고 이슈 작업 영역을 분류
        uses: actions/github-script@v7
        with:
          script: |
            const requiredLabels = [
              {
                name: "Front-end",
                color: "1D76DB",
                description: "프론트엔드 작업 영역"
              },
              {
                name: "Back-end",
                color: "0E8A16",
                description: "백엔드 작업 영역"
              },
              {
                name: "Feature",
                color: "A2EEEF",
                description: "기능 작업 이슈"
              },
              {
                name: "Fix",
                color: "D73A4A",
                description: "버그 수정 이슈"
              },
              {
                name: "Task",
                color: "FBCA04",
                description: "기술 또는 운영 작업 이슈"
              }
            ];

            for (const label of requiredLabels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
              }
            }

            if (context.eventName !== "issues") {
              core.info("이 실행은 이슈 이벤트로 시작된 것이 아니어서 작업 영역 분류를 건너뜁니다.");
              return;
            }

            const body = context.payload.issue.body || "";
            const workstreamMatch = body.match(/### (?:작업 영역|Workstream)\s+([\s\S]*?)(?:\n###|\n##|$)/);
            const workstreamBlock = workstreamMatch ? workstreamMatch[1] : "";

            const labelsToApply = [];
            if (/Front-end/i.test(workstreamBlock)) labelsToApply.push("Front-end");
            if (/Back-end/i.test(workstreamBlock)) labelsToApply.push("Back-end");

            if (labelsToApply.length === 0) {
              core.warning("이슈 본문에서 작업 영역 라벨을 찾지 못했습니다.");
              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labelsToApply
            });

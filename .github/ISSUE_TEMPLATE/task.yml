name: Task
description: 기술 작업 및 운영성 작업용 이슈 템플릿
title: "[Task] "
labels:
  - Task
body:
  - type: markdown
    attributes:
      value: |
        생성된 이슈 번호의 숫자 부분이 branch naming의 `issueNum`입니다.
        예: 이슈가 `#123`이면 branch는 `feat/back-end/123-add-ci-check` 형식을 사용합니다.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: 작업 목적을 한 줄로 적습니다.
      placeholder: PR 검증용 백엔드 테스트 workflow 추가
    validations:
      required: true
  - type: dropdown
    id: workstream
    attributes:
      label: Workstream
      description: 이 작업의 주 작업 영역을 선택합니다.
      options:
        - Front-end
        - Back-end
    validations:
      required: true
  - type: dropdown
    id: task_type
    attributes:
      label: Task Type
      options:
        - Refactor
        - CI/CD
        - Documentation
        - Build / Tooling
        - Test Infrastructure
    validations:
      required: true
  - type: textarea
    id: deliverables
    attributes:
      label: Deliverables
      description: 구체적인 산출물을 적습니다.
      placeholder: |
        - GitHub Actions workflow 추가
        - 실패 시 머지 차단
    validations:
      required: true
  - type: checkboxes
    id: docs_impact
    attributes:
      label: Docs Impact
      options:
        - label: Docs/api-spec-vX.Y.md 업데이트 필요
        - label: Docs/FE-comment-vX.Y.md 업데이트 필요
        - label: Docs/BE-comment-vX.Y.md 업데이트 필요
        - label: 추가 문서 영향 없음


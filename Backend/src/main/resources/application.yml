spring:
  application:
    name: april-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/april}
    username: ${SPRING_DATASOURCE_USERNAME:april}
    password: ${SPRING_DATASOURCE_PASSWORD:april}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  session:
    timeout: 12h

server:
  shutdown: graceful

nanobanana:
  api-key: ${NANOBANANA_API_KEY:}
  base-url: ${NANOBANANA_BASE_URL:https://api.nanobanana.example}

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: WARN


openapi: 3.1.0
info:
  title: 딸깍 콘테스트 백엔드 MVP API
  version: 0.1.0
  description: 4월 MVP 기능 범위를 위한 백엔드 우선 계약 문서.
servers:
  - url: https://api.example.com
    description: 운영 환경 예시
  - url: http://localhost:8080
    description: 로컬 개발 환경
tags:
  - name: 인증
  - name: 교수
  - name: 공부 세션
  - name: 시나리오 이벤트
  - name: 최종 결과
paths:
  /api/auth/signup:
    post:
      tags: [인증]
      summary: 사용자 계정을 생성한다
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: 계정 생성 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
  /api/auth/login:
    post:
      tags: [인증]
      summary: 로그인하고 현재 사용자와 활성 세션 상태를 반환한다
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
  /api/professors:
    post:
      tags: [교수]
      summary: 교수 프로필을 등록하고 캐릭터 에셋 생성을 시작한다
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfessorCreateRequest"
      responses:
        "201":
          description: 교수 생성 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessorCreateResponse"
    get:
      tags: [교수]
      summary: 인증된 사용자의 교수 목록을 조회한다
      security:
        - cookieAuth: []
      responses:
        "200":
          description: 교수 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  professors:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProfessorResponse"
                required: [professors]
  /api/professors/{professorId}:
    get:
      tags: [교수]
      summary: 교수 상세 정보와 호감도 상태를 조회한다
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ProfessorId"
      responses:
        "200":
          description: 교수 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessorDetailResponse"
  /api/study-sessions:
    post:
      tags: [공부 세션]
      summary: 공부 세션을 시작한다
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudySessionStartRequest"
      responses:
        "201":
          description: 공부 세션 시작 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudySessionStartResponse"
  /api/study-sessions/active:
    get:
      tags: [공부 세션]
      summary: 현재 활성 공부 세션을 조회한다
      security:
        - cookieAuth: []
      responses:
        "200":
          description: 활성 세션 조회
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveStudySessionResponse"
  /api/study-sessions/{sessionId}/visibility:
    post:
      tags: [공부 세션]
      summary: 세션의 숨김 또는 복귀 이벤트를 기록한다
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VisibilityEventRequest"
      responses:
        "202":
          description: 가시성 이벤트 접수 완료
  /api/study-sessions/{sessionId}/end:
    post:
      tags: [공부 세션]
      summary: 공부 세션을 종료하고 정산한다
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudySessionEndRequest"
      responses:
        "200":
          description: 세션 정산 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudySessionEndResponse"
  /api/scenario-events/{eventId}/choices/{choiceId}:
    post:
      tags: [시나리오 이벤트]
      summary: 시나리오 이벤트 선택 결과를 처리한다
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/EventId"
        - $ref: "#/components/parameters/ChoiceId"
      responses:
        "200":
          description: 선택지 처리 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioChoiceResolutionResponse"
  /api/final-results:
    post:
      tags: [최종 결과]
      summary: 시험 점수를 제출하고 최종 결과를 생성한다
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinalResultRequest"
      responses:
        "200":
          description: 최종 결과 생성 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinalResultResponse"
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: JSESSIONID
  parameters:
    ProfessorId:
      name: professorId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EventId:
      name: eventId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ChoiceId:
      name: choiceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    SignupRequest:
      type: object
      properties:
        name:
          type: string
        loginId:
          type: string
        password:
          type: string
        examEndDate:
          type: string
          format: date
      required: [name, loginId, password, examEndDate]
    LoginRequest:
      type: object
      properties:
        loginId:
          type: string
        password:
          type: string
      required: [loginId, password]
    UserEnvelope:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserSummary"
      required: [user]
    UserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        loginId:
          type: string
        examEndDate:
          type: string
          format: date
      required: [id, name, loginId, examEndDate]
    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserSummary"
        activeSession:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/StudySessionSummary"
      required: [user, activeSession]
    ProfessorCreateRequest:
      type: object
      properties:
        professorName:
          type: string
        gender:
          type: string
          enum: [male, female]
        personalityType:
          type: string
          enum: [gentle, tsundere, english_mix, shy]
        sourcePhotoUrl:
          type: string
          format: uri
          nullable: true
      required: [professorName, gender, personalityType]
    ProfessorCreateResponse:
      type: object
      properties:
        professor:
          $ref: "#/components/schemas/ProfessorResponse"
      required: [professor]
    ProfessorResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        professorName:
          type: string
        gender:
          type: string
          enum: [male, female]
        personalityType:
          type: string
          enum: [gentle, tsundere, english_mix, shy]
        sourcePhotoUrl:
          type: string
          format: uri
          nullable: true
        characterAssetStatus:
          type: string
          enum: [pending, ready]
        representativeAssetUrl:
          type: string
          format: uri
          nullable: true
        isDefaultCharacterAssets:
          type: boolean
      required:
        - id
        - professorName
        - gender
        - personalityType
        - characterAssetStatus
        - isDefaultCharacterAssets
    ProfessorDetailResponse:
      type: object
      properties:
        professor:
          $ref: "#/components/schemas/ProfessorResponse"
        affection:
          $ref: "#/components/schemas/AffectionState"
        characterAssets:
          type: array
          items:
            $ref: "#/components/schemas/CharacterAssetResponse"
      required: [professor, affection, characterAssets]
    CharacterAssetResponse:
      type: object
      properties:
        variantKey:
          type: string
        imageUrl:
          type: string
          format: uri
        isDefaultAsset:
          type: boolean
      required: [variantKey, imageUrl, isDefaultAsset]
    AffectionState:
      type: object
      properties:
        professorId:
          type: string
          format: uuid
        affectionScore:
          type: integer
      required: [professorId, affectionScore]
    StudySessionStartRequest:
      type: object
      properties:
        professorId:
          type: string
          format: uuid
      required: [professorId]
    StudySessionStartResponse:
      type: object
      properties:
        session:
          $ref: "#/components/schemas/StudySessionSummary"
      required: [session]
    ActiveStudySessionResponse:
      type: object
      properties:
        session:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/StudySessionSummary"
      required: [session]
    StudySessionSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        startedAt:
          type: string
          format: date-time
      required: [id, status, startedAt]
    VisibilityEventRequest:
      type: object
      properties:
        type:
          type: string
          enum: [hidden, visible]
        occurredAt:
          type: string
          format: date-time
      required: [type, occurredAt]
    StudySessionEndRequest:
      type: object
      properties:
        endedAt:
          type: string
          format: date-time
      required: [endedAt]
    StudySessionEndResponse:
      type: object
      properties:
        sessionSummary:
          $ref: "#/components/schemas/SessionSettlement"
        dialogue:
          $ref: "#/components/schemas/DialoguePayload"
        event:
          $ref: "#/components/schemas/EventPayload"
      required: [sessionSummary, dialogue, event]
    SessionSettlement:
      type: object
      properties:
        totalSeconds:
          type: integer
        hiddenSeconds:
          type: integer
        effectiveStudySeconds:
          type: integer
        globalAffectionGain:
          type: integer
        updatedProfessorCount:
          type: integer
        earlyTerminationPenalty:
          type: integer
        idlePenaltyCount:
          type: integer
        currentProfessorAffectionDelta:
          type: integer
        currentProfessorNextAffectionScore:
          type: integer
      required:
        - totalSeconds
        - hiddenSeconds
        - effectiveStudySeconds
        - globalAffectionGain
        - updatedProfessorCount
        - earlyTerminationPenalty
        - idlePenaltyCount
        - currentProfessorAffectionDelta
        - currentProfessorNextAffectionScore
    DialoguePayload:
      type: object
      properties:
        triggerType:
          type: string
        lines:
          type: array
          items:
            $ref: "#/components/schemas/ScriptLine"
      required: [triggerType, lines]
    EventPayload:
      type: object
      properties:
        triggered:
          type: boolean
        eventId:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
          nullable: true
        rangeBand:
          type: string
          enum: ["0-19", "20-49", "50-84", "85-100"]
          nullable: true
        branchKey:
          type: string
          nullable: true
        lines:
          type: array
          items:
            $ref: "#/components/schemas/ScriptLine"
          nullable: true
        choices:
          type: array
          items:
            $ref: "#/components/schemas/EventChoice"
      required: [triggered, choices]
    EventChoice:
      type: object
      properties:
        id:
          type: string
          format: uuid
        text:
          type: string
      required: [id, text]
    ScenarioChoiceResolutionResponse:
      type: object
      properties:
        result:
          type: object
          properties:
            lines:
              type: array
              items:
                $ref: "#/components/schemas/ScriptLine"
            affectionDelta:
              type: integer
            nextAffectionScore:
              type: integer
            nextState:
              type: string
              enum: [resolved]
          required: [lines, affectionDelta, nextAffectionScore, nextState]
      required: [result]
    FinalResultRequest:
      type: object
      properties:
        examScore:
          type: integer
      required: [examScore]
    FinalResultResponse:
      type: object
      properties:
        result:
          type: object
          properties:
            primaryProfessorId:
              type: string
              format: uuid
            highestProfessorId:
              type: string
              format: uuid
            lowestProfessorId:
              type: string
              format: uuid
            scoreBand:
              type: string
            endingType:
              type: string
              enum: [happy, normal, bad]
            script:
              type: array
              items:
                $ref: "#/components/schemas/ScriptLine"
          required:
            - primaryProfessorId
            - highestProfessorId
            - lowestProfessorId
            - scoreBand
            - endingType
            - script
      required: [result]
    ScriptLine:
      oneOf:
        - $ref: "#/components/schemas/ProfessorDialogueLine"
        - $ref: "#/components/schemas/ProtagonistDialogueLine"
        - $ref: "#/components/schemas/NonSpeakerLine"
    ProfessorDialogueLine:
      type: object
      description: 교수 대사 라인. speakerRole과 speakerName을 함께 포함한다.
      properties:
        kind:
          type: string
          enum: [dialogue]
        speakerRole:
          type: string
          enum: [professor]
        speakerName:
          type: string
        text:
          type: string
      required: [kind, speakerRole, speakerName, text]
    ProtagonistDialogueLine:
      type: object
      description: 주인공 대사 라인. speakerRole만 포함하고 speakerName은 생략한다.
      properties:
        kind:
          type: string
          enum: [dialogue]
        speakerRole:
          type: string
          enum: [protagonist]
        text:
          type: string
      required: [kind, speakerRole, text]
      not:
        required: [speakerName]
    NonSpeakerLine:
      type: object
      description: 상황 설명, 무대 지시, 내면 독백 라인. 화자 관련 키는 포함하지 않는다.
      properties:
        kind:
          type: string
          enum: [narration, stage_direction, inner_monologue]
        text:
          type: string
      required: [kind, text]
      not:
        anyOf:
          - required: [speakerRole]
          - required: [speakerName]
